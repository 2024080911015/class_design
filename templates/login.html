{% extends "base.html" %}

{% block title %}登录{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-shell">
    <section class="auth-panel">
        <div class="auth-header">
            <h1>登录</h1>
            <p>内部文件仓库</p>
        </div>
        <form id="loginForm" class="auth-form" method="post" action="{{ url_for('login') }}">
            <div class="field-group">
                <label for="loginUser">账号</label>
                <input id="loginUser" type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="field-group">
                <label for="loginPass">密码</label>
                <input id="loginPass" type="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">去注册</a>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
