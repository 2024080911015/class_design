{% extends "base.html" %}

{% block title %}注册{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-shell">
    <section class="auth-panel">
        <div class="auth-header">
            <h1>注册</h1>
            <p>内部文件仓库</p>
        </div>
        <form id="registerForm" class="auth-form" method="post" action="{{ url_for('register') }}">
            <div class="field-group">
                <label for="regUser">账号</label>
                <input id="regUser" type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="field-group">
                <label for="regPass">密码</label>
                <input id="regPass" type="password" name="password" placeholder="请输入密码" autocomplete="new-password" required>
            </div>
            <button type="submit">注册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
